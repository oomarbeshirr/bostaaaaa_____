name: Security Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  
  workflow_dispatch:

jobs:
  security-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run security tests
        env:
          
          API_TOKEN: ${{ secrets.API_TOKEN }}
          BOSTA_API_URL: ${{ vars.BOSTA_API_URL || 'https://stg-app.bosta.co/api/v2' }}
        run: python security_tests.py

      - name: Generate test report meta
        if: always()
        run: |
          echo "Security test results metadata" >> security_report.txt
          echo "Workflow: ${{ github.workflow }}" >> security_report.txt
          echo "Run ID: ${{ github.run_id }}" >> security_report.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: |
            security_report.txt
            security_assessment_report.txt
